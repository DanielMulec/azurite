        - textbox [ref=e1863]:
          - heading "Azurite Product Vision" [level=1] [ref=e1864]
          - heading "Summary" [level=2] [ref=e1865]
          - paragraph [ref=e1866]: Azurite is intended to become a production-quality, locally hosted knowledge application that combines Obsidian-style knowledge infrastructure with a Notion-style web experience.
          - paragraph [ref=e1867]: The system should feel polished and dependable enough for daily use, while keeping the user's knowledge base transparent, portable, and markdown-first.
          - heading "Core Direction" [level=2] [ref=e1868]
          - list [ref=e1869]:
            - listitem [ref=e1871]:
              - paragraph [ref=e1879]: Build a hybrid of Obsidian and Notion, not a clone of either product.
            - listitem [ref=e1881]:
              - paragraph [ref=e1889]: Treat markdown files as the source of truth for all knowledge content.
            - listitem [ref=e1891]:
              - paragraph [ref=e1899]: Keep the early content model limited to structures that are supported by markdown and can round-trip cleanly back to markdown files.
            - listitem [ref=e1901]:
              - paragraph [ref=e1909]: Keep knowledge behavior local-first, inspectable, and resilient.
            - listitem [ref=e1911]:
              - paragraph [ref=e1919]: Prefer durable architecture over quick prototypes when making foundation-level decisions.
          - heading "Knowledge Backend" [level=2] [ref=e1920]
          - paragraph [ref=e1921]: "The backend should follow the spirit of Obsidian's knowledge model and programmatic capabilities:"
          - list [ref=e1922]:
            - listitem [ref=e1924]:
              - paragraph [ref=e1932]: Markdown-native storage for notes and knowledge artifacts.
            - listitem [ref=e1934]:
              - paragraph [ref=e1942]: Fast indexing of documents, links, tags, metadata, headings, and references.
            - listitem [ref=e1944]:
              - paragraph [ref=e1952]: Graph-aware behavior for links, backlinks, unresolved links, and relationship exploration.
            - listitem [ref=e1954]:
              - paragraph [ref=e1962]: Cluster-level organization similar to Obsidian vaults, using Azurite's own product language instead of Obsidian's "vault" terminology.
            - listitem [ref=e1964]:
              - paragraph [ref=e1972]: LSP-like knowledge services where useful, such as link resolution, reference lookup, rename support, diagnostics for broken links, document symbols, completions, and hover metadata.
            - listitem [ref=e1974]:
              - paragraph [ref=e1982]: Derived indexes and caches may exist, but they must be rebuildable from the markdown source.
          - paragraph [ref=e1983]: Use "cluster" as the user-facing product term for Azurite's version of an Obsidian vault. A cluster is a self-contained folder-backed collection of markdown knowledge, configuration, indexes, and graph state. Current code and API contracts may still use "workspace" as the implementation term until a focused rename slice updates those contracts deliberately.
          - heading "Repository And Cluster Boundaries" [level=2] [ref=e1984]
          - paragraph [ref=e1985]: "Keep these locations conceptually separate:"
          - list [ref=e1986]:
            - listitem [ref=e1988]:
              - paragraph [ref=e1996]: "Source repository: this Git repository is for Azurite's application source code, documentation, tests, and development tooling."
            - listitem [ref=e1998]:
              - paragraph [ref=e2006]: "Installed or running product: the built Azurite app, server, runtime, and supporting files should be installable or runnable from any appropriate folder on the user's system. The product must not depend on this Git checkout being its runtime location."
            - listitem [ref=e2008]:
              - paragraph [ref=e2016]: "Knowledge cluster: the user's markdown knowledge collection must be usable from anywhere on the system, such as an existing notes folder, a synced directory, an external drive, or another local path selected by the user."
          - paragraph [ref=e2017]: "User knowledge clusters must not be coupled to this repository or stored inside it by default. The application should treat cluster locations as user-selected filesystem roots. Any generated indexes, caches, or app metadata must respect that boundary: source markdown remains in the chosen cluster, and derived state should be clearly separated, rebuildable, and safe to delete."
          - heading "Frontend" [level=2] [ref=e2018]
          - paragraph [ref=e2019]: The frontend should be web-based and usable as a progressive web app on both desktop and smartphone.
          - list [ref=e2020]:
            - listitem [ref=e2022]:
              - paragraph [ref=e2030]: The primary interface should be a local web app.
            - listitem [ref=e2032]:
              - paragraph [ref=e2040]: It should support installation or app-like use as a PWA.
            - listitem [ref=e2042]:
              - paragraph [ref=e2050]: The mobile experience matters because the app will be used from a smartphone.
            - listitem [ref=e2052]:
              - paragraph [ref=e2060]: Mobile sessions must tolerate browser reloads, tab discard, app switching, and reconnects without dumping the user back at an arbitrary first note or silently losing an in-progress edit.
            - listitem [ref=e2062]:
              - paragraph [ref=e2070]: The desktop experience should feel efficient for deep writing, navigation, linking, and knowledge work.
            - listitem [ref=e2072]:
              - paragraph [ref=e2080]: The visual and interaction quality should aim for a Notion-level sense of polish, clarity, and approachability without adopting Notion-only content blocks that cannot be represented in markdown.
            - listitem [ref=e2082]:
              - paragraph [ref=e2090]: The editor should eventually feel fluent and approachable like Notion while keeping markdown files as the source of truth.
          - heading "Markdown Rendering Scope" [level=2] [ref=e2091]
          - paragraph [ref=e2092]: The Notion-inspired part of the product is about frontend polish, interaction quality, and approachable editing, not about adopting a proprietary block model.
          - paragraph [ref=e2093]: In the early stages, the frontend should only render and edit content structures that are officially supported by markdown or by the project's explicitly chosen markdown dialect. Every visible content block should have a faithful markdown representation because all knowledge files are markdown files.
          - paragraph [ref=e2094]: Do not add Notion-style proprietary blocks that cannot be represented in markdown. A parser/renderer system for non-standard blocks may be considered later, but it should be treated as a deliberate extension rather than part of the initial product scope.
          - paragraph [ref=e2095]: Editing must follow the same rule as rendering. Early editing should support only markdown-backed structures that can round-trip cleanly to markdown. Richer editing affordances, such as shortcuts, toolbar actions, slash commands, and block-level interactions, should operate on markdown-supported structures rather than introducing a proprietary document model.
          - heading "Local Access And Security" [level=2] [ref=e2096]
          - paragraph [ref=e2097]: Azurite is intended to be hosted locally and accessed privately.
          - list [ref=e2098]:
            - listitem [ref=e2100]:
              - paragraph [ref=e2108]: No one outside the user's Tailscale network should have access.
            - listitem [ref=e2110]:
              - paragraph [ref=e2118]: Smartphone access should happen over Tailscale.
            - listitem [ref=e2120]:
              - paragraph [ref=e2128]: Desktop access should also work as a local or Tailscale-reachable PWA.
            - listitem [ref=e2130]:
              - paragraph [ref=e2138]: Public internet exposure is out of scope unless explicitly reconsidered later.
            - listitem [ref=e2140]:
              - paragraph [ref=e2148]: Deployment decisions should preserve the private-by-default access model.
          - heading "Development Observability" [level=2] [ref=e2149]
          - paragraph [ref=e2150]: The private-by-default product direction does not restrict Daniel-owned Sentry debug sessions. When Daniel explicitly enables Sentry for local development, diagnostic telemetry is allowed to be uncensored so real failures can be understood from logs, traces, replay, app state, request context, and backend filesystem evidence.
          - paragraph [ref=e2151]: Sentry debug observability is a development capability, not the public telemetry or privacy policy for a future distributed Azurite product.
          - paragraph [ref=e2152]: "After the semantic observability foundation and its mandatory editor-correctness follow-up are complete, Azurite may add a measured lightweight Sentry mode for Daniel's daily use and may keep that mode permanently enabled. A daily profile must remain distinct from exhaustive full debug: it should retain useful errors, breadcrumbs, sampled traces, and error-triggered or modest Replay while keeping high-frequency editor telemetry and rich product payloads behind explicit full debug configuration. Adopt it only after real editor responsiveness, memory, network, and event-volume evidence shows that its daily cost is negligible."
          - heading "Quality Bar" [level=2] [ref=e2153]
          - paragraph [ref=e2154]: "Production quality means:"
          - list [ref=e2155]:
            - listitem [ref=e2157]:
              - paragraph [ref=e2165]: Reliable persistence and recoverability of markdown content.
            - listitem [ref=e2167]:
              - paragraph [ref=e2175]: Clear separation between source content and rebuildable derived state.
            - listitem [ref=e2177]:
              - paragraph [ref=e2185]: Strong tests around indexing, linking, graph behavior, and synchronization boundaries.
            - listitem [ref=e2187]:
              - paragraph [ref=e2195]: Thoughtful handling of malformed markdown, missing files, renamed documents, and broken links.
            - listitem [ref=e2197]:
              - paragraph [ref=e2205]: A responsive, accessible, and robust PWA user experience across desktop and mobile.
            - listitem [ref=e2207]:
              - paragraph [ref=e2215]: Resilient mobile editing behavior that can recover the selected note and warn about unsaved drafts after a browser reload or mobile OS tab discard.
            - listitem [ref=e2217]:
              - paragraph [ref=e2225]: Security decisions that assume private knowledge content is sensitive.
          - heading "Open Product Decisions" [level=2] [ref=e2226]
          - list [ref=e2227]:
            - listitem [ref=e2229]:
              - paragraph [ref=e2237]: Exact markdown extensions and frontmatter conventions.
            - listitem [ref=e2239]:
              - paragraph [ref=e2247]: Whether editing should be pure markdown, block-oriented, or a careful hybrid.
            - listitem [ref=e2249]:
              - paragraph [ref=e2257]: How much Notion-like structured data should exist while keeping markdown as the source of truth.
            - listitem [ref=e2259]:
              - paragraph [ref=e2267]: Whether a later parser/renderer layer should support deliberate non-standard markdown extensions or custom blocks.
            - listitem [ref=e2269]:
              - paragraph [ref=e2277]: Exact implementation migration from current "workspace" contracts to user-facing "cluster" language.
            - listitem [ref=e2279]:
              - paragraph [ref=e2287]: Authentication and network-binding strategy for local plus Tailscale access.
          - paragraph [ref=e2288]