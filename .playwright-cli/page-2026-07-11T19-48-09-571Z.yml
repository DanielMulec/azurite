          - paragraph [ref=f2e1492]:
            - text: Slice 7C enriches the truthful 7B note route result that observed a cluster or filesystem failure. It does not reintroduce a standalone
            - code [ref=f2e1493]: cluster.metadata.failed
            - text: event or invent filesystem provenance unavailable at the route boundary.
          - heading "Replay Configuration Boundary" [level=3] [ref=f2e1494]
          - paragraph [ref=f2e1495]: Session Replay runs for explicitly enabled local debug sessions. Slice 7A installs the runtime Replay configuration. Slice 7C verifies and adjusts the current SDK options, through TypeScript types, so replay is useful for editor debugging.
          - paragraph [ref=f2e1496]: "Replay requirements:"
          - list [ref=f2e1497]:
            - listitem [ref=f2e1499]:
              - paragraph [ref=f2e1507]: note text in the Milkdown editor is visible in replay
            - listitem [ref=f2e1509]:
              - paragraph [ref=f2e1517]: note text in the markdown textarea is visible in replay
            - listitem [ref=f2e1519]:
              - paragraph [ref=f2e1527]: editor DOM, focus, selection-adjacent context, and block-menu state are visible enough to investigate the Milkdown block-menu QA finding
            - listitem [ref=f2e1529]:
              - paragraph [ref=f2e1537]: media and icons are not blocked if seeing them helps debug layout or editor state
            - listitem [ref=f2e1539]:
              - paragraph [ref=f2e1547]:
                - text: replay sampling is
                - code [ref=f2e1548]: "1.0"
                - text: for explicitly enabled local debug sessions unless Daniel lowers it through env vars
            - listitem [ref=f2e1550]:
              - paragraph [ref=f2e1558]: manual Sentry UI verification confirms uploaded desktop and mobile replays actually show editor text, textarea text, relevant DOM state, and the Milkdown block-menu interaction context
          - heading "Telemetry Carrier Mapping" [level=3] [ref=f2e1559]
          - paragraph [ref=f2e1560]: Logs are the primary carrier for semantic Azurite lifecycle/result events. Prefer one wide, structured log per meaningful operation result over many thin logs that require manual reconstruction.
          - paragraph [ref=f2e1561]: Breadcrumbs are the lightweight chronological trail for route changes, editor mode/status changes, Milkdown lifecycle markers, draft attempts, save button intent, recovery visibility, and block-menu observations. Breadcrumbs must help replay navigation without carrying every full payload.
          - paragraph [ref=f2e1562]:
            - text: "Spans measure operations with duration: note load, draft read/write/delete, save, frontend API calls, backend request handling, and server route-boundary work that calls into cluster metadata and filesystem-backed core helpers. Spans should attach request ID, operation ID, route, method, note ID, cluster ID, result status, and duration where available. This slice does not create direct spans inside"
            - code [ref=f2e1563]: packages/core
            - text: .
          - paragraph [ref=f2e1564]:
            - text: Tags carry low-cardinality filter dimensions such as
            - code [ref=f2e1565]: app.surface
            - text: ", environment, release, route pattern, result status, editor mode, recovery kind, and test-event status."
          - paragraph [ref=f2e1566]: Context and structured attributes carry high-cardinality or rich diagnostic fields such as note ID, cluster ID, request ID, operation ID, editor session ID, content hashes, local filesystem paths, selected route values, markdown lengths, draft timestamps, bounded payload summaries, and state snapshot summaries.
          - paragraph [ref=f2e1567]: Errors and captured exceptions are reserved for real failures, deliberate development test events, and error-boundary captures. Do not turn normal successful lifecycle events into fake exceptions just to make them visible.
          - paragraph [ref=f2e1568]:
            - text: Browser request, operation, and editor context stays closure- or session-owned and is passed as explicit event attributes. It must never be installed on the browser global/isolation scope. Backend request context remains owned by the decorated Fastify request. Sentry
            - code [ref=f2e1569]: withScope
            - text: usage is event-local so note IDs, markdown, and operation IDs cannot leak into unrelated events.
          - heading "Payload Carrier Mapping" [level=3] [ref=f2e1570]
          - paragraph [ref=f2e1571]: "Structured logs are the searchable primary event record and carry payload metadata: payload kind, byte length, markdown length, content hash, truncation status, and the correlation IDs needed to find the related replay/trace/event."
          - paragraph [ref=f2e1572]: Breadcrumbs never carry full markdown or draft payloads.
          - paragraph [ref=f2e1573]:
            - text: Full markdown and draft text can be sent only on eligible bounded debug events. The chosen carrier is a Sentry captured event context named
            - code [ref=f2e1574]: azurite.debug_payload
            - text: on a paired
            - code [ref=f2e1575]: captureMessage
            - text: or
            - code [ref=f2e1576]: captureException
            - text: event for that eligible debug event.
          - paragraph [ref=f2e1577]: Payload-bearing captured events must use the same event names, request IDs, operation IDs, note IDs, cluster IDs, release, environment, and result status as their structured log pair.
          - paragraph [ref=f2e1578]: Captured messages used for payload-bearing debug events are not fake failures. They are explicit debug payload carriers for allowed state transitions, deliberate test events, and real failure/conflict/recovery evidence.
          - heading "Telemetry Volume Contract" [level=3] [ref=f2e1579]
          - paragraph [ref=f2e1580]: Uncensored does not mean noisy enough to become useless. Slice 7C defines when full payloads are sent.
          - paragraph [ref=f2e1581]: "Volume requirements:"
          - list [ref=f2e1582]:
            - listitem [ref=f2e1584]:
              - paragraph [ref=f2e1592]:
                - text: Lifecycle events such as
                - code [ref=f2e1593]: editor.milkdown.markdown_updated
                - text: record note ID, editor session ID, markdown length, dirty status, revision, and hashes by default.
            - listitem [ref=f2e1595]:
              - paragraph [ref=f2e1603]: "Full markdown snapshots can be attached only to bounded events where the payload explains the failure or state transition: note load success/failure, draft recovery visibility, save start, save conflict, save failure, and deliberate test events."
            - listitem [ref=f2e1605]:
              - paragraph [ref=f2e1613]: Eligible does not mean mandatory for every event; the helper decides from event type, configured limit, and available payload.
            - listitem [ref=f2e1615]:
              - paragraph [ref=f2e1623]: Full payload capture is bounded for event-size and usefulness reasons, not privacy minimization.
            - listitem [ref=f2e1625]:
              - paragraph [ref=f2e1633]: The implementation defines shared debug payload limits with an initial default of 128 KiB per text payload.
            - listitem [ref=f2e1635]:
              - paragraph [ref=f2e1643]:
                - text: Payloads at or below the limit are sent whole in the
                - code [ref=f2e1644]: azurite.debug_payload
                - text: event context for eligible payload-bearing captured events.
            - listitem [ref=f2e1646]:
              - paragraph [ref=f2e1654]:
                - text: Larger payloads are represented with
                - code [ref=f2e1655]: azurite.payload_truncated_for_size = true
                - text: ", original byte length, content hash, and diagnostically useful leading/trailing text windows."
            - listitem [ref=f2e1657]:
              - paragraph [ref=f2e1665]: Draft payloads are attached for draft read/write/delete failures and recovery states, not for every debounced successful write.
            - listitem [ref=f2e1667]:
              - paragraph [ref=f2e1675]: Zustand snapshots are attached for explicit error, conflict, stale-response, recovery, or deliberate test events.
            - listitem [ref=f2e1677]:
              - paragraph [ref=f2e1685]: Repeated high-frequency editor updates are rate-limited, coalesced, or logged with metadata-only attributes.
            - listitem [ref=f2e1687]:
              - paragraph [ref=f2e1695]:
                - code [ref=f2e1696]: editor.milkdown.markdown_updated
                - text: emits at most one metadata-only log per editor session per second during continuous typing, plus explicit result events for save, conflict, recovery, mode changes, and deliberate test events.
            - listitem [ref=f2e1698]:
              - paragraph [ref=f2e1706]: Observability helpers never await Sentry network work inside Milkdown, Zustand, Dexie, or save-state mutation paths.
            - listitem [ref=f2e1708]:
              - paragraph [ref=f2e1716]: Local buffers, timers, or coalescers are cleared when the editor session changes so stale note content cannot be emitted under a new note ID.
            - listitem [ref=f2e1718]:
              - paragraph [ref=f2e1726]: Normal editing remains responsive during Sentry-enabled debug sessions.
          - heading "Editor Instrumentation Boundary" [level=3] [ref=f2e1727]
          - paragraph [ref=f2e1728]: Milkdown and Crepe instrumentation must observe editor behavior without owning editor behavior.
          - paragraph [ref=f2e1729]: "Implementation requirements:"
          - list [ref=f2e1730]:
            - listitem [ref=f2e1732]:
              - paragraph [ref=f2e1740]: Reuse the current editor session identity where possible.
            - listitem [ref=f2e1742]:
              - paragraph [ref=f2e1750]:
                - text: If the existing
                - code [ref=f2e1751]: EditorSession.sessionKey
                - text: is renamed or wrapped, avoid creating a parallel editor identity.
            - listitem [ref=f2e1753]:
              - paragraph [ref=f2e1761]: Capture mount and destroy events with reasons where available.
            - listitem [ref=f2e1763]:
              - paragraph [ref=f2e1771]: Capture focus changes and selection summaries without sending full document snapshots through breadcrumbs.
            - listitem [ref=f2e1773]:
              - paragraph [ref=f2e1781]: Capture observable ProseMirror transaction summaries.
            - listitem [ref=f2e1783]:
              - paragraph [ref=f2e1791]: Capture markdown update metadata with coalescing.
            - listitem [ref=f2e1793]:
              - paragraph [ref=f2e1801]: Capture mode/status transitions at the existing app-state boundary.
            - listitem [ref=f2e1803]:
              - paragraph [ref=f2e1811]: Capture Crepe block-menu open/close behavior and context when the package exposes a stable hook or observable state.
            - listitem [ref=f2e1813]:
              - paragraph [ref=f2e1821]: If Crepe block-menu state is not directly exposed, record the stable lifecycle/focus/selection/transaction evidence that explains what the implementation could observe, and document the limitation in the slice notes.
          - heading "Persistence Diagnostics Boundary" [level=3] [ref=f2e1822]
          - paragraph [ref=f2e1823]: Dexie and Zustand instrumentation must observe persistence and state transitions without changing ownership.
          - paragraph [ref=f2e1824]: "Implementation requirements:"
          - list [ref=f2e1825]:
            - listitem [ref=f2e1827]:
              - paragraph [ref=f2e1835]: Zustand remains the note browser state owner.
            - listitem [ref=f2e1837]:
              - paragraph [ref=f2e1845]: Dexie remains the durable browser persistence owner.
            - listitem [ref=f2e1847]:
              - paragraph [ref=f2e1855]: Sentry does not become a cache, source of truth, or recovery mechanism.
            - listitem [ref=f2e1857]:
              - paragraph [ref=f2e1865]: Draft read/write/delete attempts record started, succeeded, failed, and recovery-visible events.
            - listitem [ref=f2e1867]:
              - paragraph [ref=f2e1875]: Draft validation failures and database-unavailable states remain visible in the UI and become visible in Sentry.
            - listitem [ref=f2e1877]:
              - paragraph [ref=f2e1885]: Save/conflict/recovery diagnostics reuse the existing content-hash contract.
            - listitem [ref=f2e1887]:
              - paragraph [ref=f2e1895]: Observability helpers do not mutate editor, draft, route, save, or cluster state.
          - heading "Core And Filesystem Boundary" [level=3] [ref=f2e1896]
          - paragraph [ref=f2e1897]:
            - code [ref=f2e1898]: packages/core
            - text: remains Sentry-free in this slice.
          - paragraph [ref=f2e1899]: "Server routes may enrich Slice 7B route-level evidence from core calls and caught core errors:"
          - list [ref=f2e1900]:
            - listitem [ref=f2e1902]:
              - paragraph [ref=f2e1910]: request ID
            - listitem [ref=f2e1912]:
              - paragraph [ref=f2e1920]: note operation ID when available
            - listitem [ref=f2e1922]:
              - paragraph [ref=f2e1930]: note ID
            - listitem [ref=f2e1932]:
              - paragraph [ref=f2e1940]: cluster ID when available
            - listitem [ref=f2e1942]:
              - paragraph [ref=f2e1950]: route pattern and HTTP method
            - listitem [ref=f2e1952]:
              - paragraph [ref=f2e1960]: duration
            - listitem [ref=f2e1962]:
              - paragraph [ref=f2e1970]: result status
            - listitem [ref=f2e1972]:
              - paragraph [ref=f2e1980]: shared API error code
            - listitem [ref=f2e1982]:
              - paragraph [ref=f2e1990]: content hashes
            - listitem [ref=f2e1992]:
              - paragraph [ref=f2e2000]: caught core error name, code, message, stack, and local filesystem path context where available
            - listitem [ref=f2e2002]:
              - paragraph [ref=f2e2010]: bounded markdown payload context only where the volume contract allows it
          - paragraph [ref=f2e2011]:
            - text: Do not add a core observer, hook, dependency injection surface, or Sentry import to
            - code [ref=f2e2012]: packages/core
            - text: in this slice.
          - heading "File-Line And Refactor Boundary" [level=3] [ref=f2e2013]
          - paragraph [ref=f2e2014]: Several implementation targets are already near the 400-line hard limit. Slice 7C must split files before adding semantic instrumentation where needed.
          - paragraph [ref=f2e2015]: "Known pressure points:"
          - list [ref=f2e2016]:
            - listitem [ref=f2e2018]:
              - paragraph [ref=f2e2026]:
                - code [ref=f2e2027]: apps/server/src/notes-route.ts
            - listitem [ref=f2e2029]:
              - paragraph [ref=f2e2037]:
                - code [ref=f2e2038]: apps/web/src/state/note-browser-route-actions.ts
            - listitem [ref=f2e2040]:
              - paragraph [ref=f2e2048]:
                - code [ref=f2e2049]: apps/web/src/state/note-browser-editor-actions.ts
            - listitem [ref=f2e2051]:
              - paragraph [ref=f2e2059]:
                - code [ref=f2e2060]: apps/web/src/components/MilkdownEditor.tsx
          - paragraph [ref=f2e2061]: The implementation should extract focused helpers for editor instrumentation, draft instrumentation, state snapshots, payload bounds, coalescing, and backend payload enrichment instead of appending logs to already-large modules.
          - heading "Implementation Plan" [level=2] [ref=f2e2062]
          - heading "1. Confirm The Slice 7A And 7B Baseline" [level=3] [ref=f2e2063]
          - paragraph [ref=f2e2064]: Before adding semantic instrumentation, confirm the Slice 7A runtime foundation and Slice 7B correlation foundation are present.
          - paragraph [ref=f2e2065]: "Implementation requirements:"
          - list [ref=f2e2066]:
            - listitem [ref=f2e2068]:
              - paragraph [ref=f2e2076]: Verify web and server Sentry initialization modules exist and are used.
            - listitem [ref=f2e2078]:
              - paragraph [ref=f2e2086]: Verify shared event, attribute, route, and correlation constants exist.
            - listitem [ref=f2e2088]:
              - paragraph [ref=f2e2096]: Verify request ID and note operation ID propagation tests exist.
            - listitem [ref=f2e2098]:
              - paragraph [ref=f2e2106]: Verify Sentry-disabled startup and note workflow tests exist.
            - listitem [ref=f2e2108]:
              - paragraph [ref=f2e2116]: Verify runtime note read/save/conflict observability helpers exist.
            - listitem [ref=f2e2118]:
              - paragraph [ref=f2e2126]: Verify overlapping note-read, concurrent server-request, stale-response, and unrelated-event context-isolation tests exist.
            - listitem [ref=f2e2128]:
              - paragraph [ref=f2e2136]: Do not proceed by creating a parallel Sentry setup path.
          - heading "2. Extend Shared Semantic Constants" [level=3] [ref=f2e2137]
          - paragraph [ref=f2e2138]: Extend the shared observability vocabulary for editor, draft, recovery, payload, and snapshot diagnostics.
          - paragraph [ref=f2e2139]: "Implementation requirements:"
          - list [ref=f2e2140]:
            - listitem [ref=f2e2142]:
              - paragraph [ref=f2e2150]: Add shared event names for Milkdown, Crepe, editor mode/status, draft, and recovery events.
            - listitem [ref=f2e2152]:
