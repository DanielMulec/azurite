          - heading "Immediate Handoff To Editor Correctness" [level=2] [ref=f2e4238]
          - paragraph [ref=f2e4239]:
            - text: The first product slice after 7C must fix the mobile Markdown source-mode newline reversion recorded in
            - code [ref=f2e4240]: docs/qa/mobile-markdown-newline-reversion.md
            - text: . No unrelated feature slice should intervene.
          - paragraph [ref=f2e4241]: "That fix slice must:"
          - list [ref=f2e4242]:
            - listitem [ref=f2e4244]:
              - paragraph [ref=f2e4252]: use the Slice 7A runtime, Slice 7B request/note-operation correlation, and Slice 7C editor, Zustand, Dexie, payload, and Replay evidence;
            - listitem [ref=f2e4254]:
              - paragraph [ref=f2e4262]: convert the observed state-transition evidence into a durable ownership and lifecycle correction rather than a mobile-keyboard special case;
            - listitem [ref=f2e4264]:
              - paragraph [ref=f2e4272]: satisfy the acceptance boundary and negative side-effect guardrails in the QA report;
            - listitem [ref=f2e4274]:
              - paragraph [ref=f2e4282]: prove the repair with automated controlled-state tests, desktop regression tests, and physical Android phone QA; and
            - listitem [ref=f2e4284]:
              - paragraph [ref=f2e4292]: preserve manual-save conflicts, draft durability, WYSIWYG/Markdown round-tripping, URL navigation, and Sentry-disabled behavior.
          - paragraph [ref=f2e4293]: The exact implementation plan should be written from the evidence captured by 7C. This committed sequence sets the priority and outcome now without guessing at the root cause before the diagnostic foundation exists.
          - paragraph [ref=f2e4294]: If the evidence shows that created, reused, or copied cluster identity participates in the recovered-draft failure, the responsible 7C revision or immediate fix must establish and test the separate resolution contract before claiming the behavior is understood. If it does not participate, cluster lifecycle provenance remains deferred to its dedicated foundation.
          - heading "Completion Note" [level=2] [ref=f2e4295]
          - paragraph [ref=f2e4296]: When Slice 7C is complete, Sentry observability is functionally delivered for the current browser, API, editor, client state, IndexedDB draft, and filesystem-backed note workflow. Future observability work should be framed around the next product capability it serves, such as create/delete, autosave, file watching, indexing/search, PWA/service-worker behavior, hosting hardening, or release/source-map upload. The immediate editor-correctness handoff above takes priority over those later capabilities.
          - paragraph [ref=f2e4297]: After that mandatory fix, a focused Daily Observability Operating Profile may use the 7C evidence to compare disabled, lightweight daily, and full-debug configuration. It may keep the lightweight profile permanently enabled for Daniel only when measured editor responsiveness, memory, network, and event volume are negligible in daily use. Full debug remains deliberate and exhaustive; completely disabled startup remains a supported baseline.
          - paragraph [ref=f2e4298]: The first create/rename/move/delete/trash, file-watch/indexing, or multi-cluster filesystem capability must also introduce the richer stable core/shared error taxonomy required for its distinct recovery and security outcomes. This work must precede hardened multi-device or authenticated path-affecting operations and must not be implemented as telemetry-only classification.