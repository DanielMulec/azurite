            - text: only after Slices 7A and 7B are implemented and their actual runtime and correlation contracts are reflected here.
          - paragraph [ref=f2e65]: The 7B-dependent event and scope references in this plan were aligned on 2026-07-10 with the revised planned 7B contract. Slice 7C still requires a full refresh against the implemented 7B code and completion evidence before promotion.
          - paragraph [ref=f2e66]: "This slice depends on Slice 7A: Sentry Runtime Delivery Foundation and Slice 7B: Request Correlation And Note Route Evidence."
          - paragraph [ref=f2e67]: Slice 7C completes the full semantic observability promise for the current editor and persistence workflow after Slice 7A proves Sentry runtime delivery and disabled-mode safety, and Slice 7B proves frontend/backend request correlation and note route evidence.
          - heading "Product Decision" [level=2] [ref=f2e68]
          - paragraph [ref=f2e69]: Azurite builds rich editor and persistence diagnostics on top of the Slice 7A Sentry runtime foundation and the Slice 7B request-correlation foundation.
          - paragraph [ref=f2e70]: "Sentry remains the durable observability platform: event capture, structured logs, session replay, error grouping, trace correlation, and investigation UI. Azurite owns semantic instrumentation that explains product behavior inside the current note editing workflow:"
          - list [ref=f2e71]:
            - listitem [ref=f2e73]:
              - paragraph [ref=f2e81]: Milkdown and Crepe lifecycle, focus, selection, transaction, markdown update, and block-menu context.
            - listitem [ref=f2e83]:
              - paragraph [ref=f2e91]: Zustand note browser and editor session transitions.
            - listitem [ref=f2e93]:
              - paragraph [ref=f2e101]: Dexie draft read/write/delete, recovery, degraded persistence, and validation states.
            - listitem [ref=f2e103]:
              - paragraph [ref=f2e111]: save, conflict, stale-response, and recovery diagnostics with bounded rich payload context.
            - listitem [ref=f2e113]:
              - paragraph [ref=f2e121]: editor responsiveness and telemetry volume control during real large-note editing sessions.
          - paragraph [ref=f2e122]: This settles that the Milkdown block-menu QA finding and future editor/persistence failures should be investigated through replay plus semantic evidence, not by guessing from terminal logs or one-off console prints.
          - paragraph [ref=f2e123]:
            - text: "The 2026-07-10 physical-phone session added a second concrete input:"
            - code [ref=f2e124]: docs/qa/mobile-markdown-newline-reversion.md
            - text: . Android Enter briefly created a source-mode newline and then the controlled value reverted it; the same session also surfaced an unexplained recovered-draft state. Slice 7C must make those transitions explainable without claiming to fix them.
          - heading "User Story" [level=2] [ref=f2e125]
          - paragraph [ref=f2e126]: "When Azurite feels wrong while Daniel is editing real notes, we can inspect the actual session in Sentry and understand the editor and persistence path:"
          - list [ref=f2e127]:
            - listitem [ref=f2e129]:
              - paragraph [ref=f2e137]: browser replay with unmasked editor/debug content
            - listitem [ref=f2e139]:
              - paragraph [ref=f2e147]: route and selected-note context
            - listitem [ref=f2e149]:
              - paragraph [ref=f2e157]: Milkdown/Crepe lifecycle, focus, selection, transaction, and block-menu events
            - listitem [ref=f2e159]:
              - paragraph [ref=f2e167]: markdown update summaries without high-frequency noise
            - listitem [ref=f2e169]:
              - paragraph [ref=f2e177]: Zustand state transitions relevant to note load, save, conflict, recovery, and stale-response handling
            - listitem [ref=f2e179]:
              - paragraph [ref=f2e187]: Dexie draft persistence and recovery evidence
            - listitem [ref=f2e189]:
              - paragraph [ref=f2e197]: bounded full markdown, draft, or state payload context only where it explains a failure or meaningful state transition
            - listitem [ref=f2e199]:
              - paragraph [ref=f2e207]: the same request ID and note operation ID established by Slice 7B
          - heading "Why This Matters" [level=2] [ref=f2e208]
          - paragraph [ref=f2e209]: "Slice 7A proves that Azurite can send web/server telemetry. Slice 7B proves that note reads, saves, and conflicts can be correlated across frontend and backend route evidence. That is necessary, but it does not yet answer the hardest current questions:"
          - list [ref=f2e210]:
            - listitem [ref=f2e212]:
              - paragraph [ref=f2e220]: Did Milkdown mount correctly?
            - listitem [ref=f2e222]:
              - paragraph [ref=f2e230]: Did focus or selection move before the block menu appeared?
            - listitem [ref=f2e232]:
              - paragraph [ref=f2e240]: Did Crepe expose enough block-menu state to explain the visual failure?
            - listitem [ref=f2e242]:
              - paragraph [ref=f2e250]: Did a markdown update come from editor input, source mode, note switch, or stale async work?
            - listitem [ref=f2e252]:
              - paragraph [ref=f2e260]: Did an Android source-mode input reach local editor state before a parent, editor lifecycle, Zustand, or Dexie transition replaced it?
            - listitem [ref=f2e262]:
              - paragraph [ref=f2e270]: Did Dexie fail, recover stale data, or show degraded persistence?
            - listitem [ref=f2e272]:
              - paragraph [ref=f2e280]: Did Zustand preserve the right conflict/recovery state?
            - listitem [ref=f2e282]:
              - paragraph [ref=f2e290]: Why did the phone display recovered-draft state for the newly created disposable cluster?
            - listitem [ref=f2e292]:
              - paragraph [ref=f2e300]: Did debug telemetry itself make editing a large note feel worse?
          - paragraph [ref=f2e301]: Slice 7C makes those questions answerable without creating a parallel product state system or weakening the file-over-app persistence model.
          - heading "Future Workflow Boundary" [level=2] [ref=f2e302]
          - heading "Current Workflow" [level=3] [ref=f2e303]
          - paragraph [ref=f2e304]: "This slice covers the semantic editor and persistence workflow on top of the Slice 7A runtime foundation and Slice 7B correlation foundation:"
