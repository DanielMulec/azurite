          - heading "Purpose" [level=2] [ref=e2299]
          - paragraph [ref=e2300]: This document describes Azurite's current system architecture and durable ownership boundaries. It does not serve as a slice history, engineering-style guide, or operational runbook.
          - list [ref=e2301]:
            - listitem [ref=e2303]:
              - paragraph [ref=e2311]:
                - text: "Product direction:"
