          - paragraph [ref=f4e664]: Keep the table compact. It is a decision boundary, not a speculative catalog of every feature Azurite may eventually gain. Omit it for isolated, reversible work whose correct boundary is already obvious.
          - paragraph [ref=f4e665]: Do not frame foundational work as a narrow bug fix when the evidence shows that Azurite needs a reusable architecture. Prefer durable product foundations over patches that would require predictable replacement.
          - paragraph [ref=f4e666]: Avoid proposals that solve only the observed symptom while ignoring the product capability revealed by that symptom.
          - heading "Regression And Side-Effect Guardrails" [level=2] [ref=f4e667]
          - paragraph [ref=f4e668]: Every meaningful slice should define not only what new capability becomes true, but also what existing guarantees must remain true.
          - paragraph [ref=f4e669]: A regression is when behavior, safety, performance, data integrity, recovery, or user experience that already worked gets worse because of a new change. Other negative side effects include silent data loss, stale state, hidden degraded states, weaker validation, duplicated sources of truth, broken browser history, performance cliffs, confusing UI copy, and tests that pass while real product behavior fails.
          - paragraph [ref=f4e670]:
            - text: Azurite's universal preservation guarantees live in
            - code [ref=f4e671]: docs/reference/product-guardrails.md
            - text: . Meaningful slice proposals must link to that baseline instead of copying it.
          - paragraph [ref=f4e672]:
            - text: Add a
            - code [ref=f4e673]: Negative Side-Effect Guardrails
            - text: section when the slice introduces risks that are specific to its changed behavior. Name only concrete failure modes the shared baseline does not express precisely enough, such as a new migration rollback, a new route transition, a new cache invalidation rule, or a new external-service degraded state.
          - paragraph [ref=f4e674]: The implementation and verification plan should cover both the new behavior and these preservation guarantees. Do not accept a slice as complete when it adds the requested capability but silently breaks an earlier product promise.
          - heading "Implementation Plans" [level=2] [ref=f4e675]
          - paragraph [ref=f4e676]: Implementation plans should be decisive, not speculative.
          - list [ref=f4e677]:
            - listitem [ref=f4e679]:
              - paragraph [ref=f4e687]: Use definite language for chosen slice behavior, data shapes, route shapes, validation rules, and acceptance criteria.
            - listitem [ref=f4e689]:
              - paragraph [ref=f4e697]: Do not write plan steps around "probably", "maybe", or vague optionality.
            - listitem [ref=f4e699]:
              - paragraph [ref=f4e707]: If implementation reveals that a planned decision is wrong, correct the plan or record the decision change instead of quietly drifting.
            - listitem [ref=f4e709]:
              - paragraph [ref=f4e717]: Keep open questions explicit and separate from committed implementation steps.
            - listitem [ref=f4e719]:
              - paragraph [ref=f4e727]: Prefer reusing existing schemas, types, helpers, and domain functions before adding new ones.
            - listitem [ref=f4e729]:
              - paragraph [ref=f4e737]: When a reused helper or schema needs to support an additional context, extend it intentionally and test every supported context rather than creating a parallel near-copy.
            - listitem [ref=f4e739]:
              - paragraph [ref=f4e747]: Dependency decisions should be made from the intended product architecture. Compare categories honestly, such as state stores, routers, IndexedDB wrappers, databases, caches, and validation libraries, before selecting a tool.
            - listitem [ref=f4e749]:
              - paragraph [ref=f4e757]: If a dependency is chosen, document the product role it owns and the kind of future work it should make easier.
            - listitem [ref=f4e759]:
              - paragraph [ref=f4e767]: For cross-cutting foundations such as observability, persistence, routing, editor integration, authentication, search, indexing, sync, local hosting, storage, and telemetry, compare tools by the future product role they will own. Prefer adopting a durable platform or dependency when the capability needs correlation, inspection, replay, persistence, security, or operational workflow that would otherwise become custom infrastructure inside Azurite.
          - heading "Decision Ownership And Non-Repetition" [level=3] [ref=f4e768]
          - paragraph [ref=f4e769]: "Each material decision has one authoritative home:"
          - list [ref=f4e770]:
            - listitem [ref=f4e772]:
              - paragraph [ref=f4e780]: The product decision and user story own the product outcome and why it matters.
            - listitem [ref=f4e782]:
              - paragraph [ref=f4e790]: Architecture owns exact behavior, responsibility, state, data, and failure semantics.
            - listitem [ref=f4e792]:
              - paragraph [ref=f4e800]: The implementation plan owns the code and documentation changes and their execution order.
            - listitem [ref=f4e802]:
              - paragraph [ref=f4e810]: Verification owns the evidence required to prove behavior and preservation.
            - listitem [ref=f4e812]:
              - paragraph [ref=f4e820]: Acceptance criteria provide a concise completion gate and reference the authoritative contracts instead of reproducing them.
          - paragraph [ref=f4e821]: Other sections may provide a short summary or reference, but must not repeat the full contract. Tables, enum catalogs, algorithms, failure mappings, concurrency rules, and other exact behavior belong in one place.
          - paragraph [ref=f4e822]: Integrate adversarial feedback by correcting the authoritative decision and the implementation or verification steps it materially changes. Do not preserve the review conversation as proposal narrative, add the same finding to every section, or turn the reconciled baseline, goals, guardrails, acceptance criteria, and handoff into parallel copies of the architecture.
          - paragraph [ref=f4e823]: Do not extract text into a reference document merely to shorten a slice. Extract only a stable contract that implemented behavior or more than one slice will reuse. A plan is sufficiently detailed when an implementer can determine the product outcome, ownership, exact behavior, failure semantics, implementation boundary, and proof without choosing among unresolved alternatives. Stop adding restatements once that condition is met.
          - heading "Sentry Debug Mode" [level=2] [ref=f4e824]
          - paragraph [ref=f4e825]: Sentry debug mode is intentionally uncensored. When a slice uses Sentry behind explicit debug configuration, the correct default is complete capture, not privacy minimization.
          - paragraph [ref=f4e826]: Do not add Sentry requirements that redact, mask, hash, sanitize, or omit Azurite debugging data for privacy reasons. Do not challenge a Sentry slice because it captures real note content, editor replay, local paths, app state, request payloads, draft data, or backend error context.
          - paragraph [ref=f4e827]: Sentry acceptance criteria should prove that the captured data is rich enough to debug real failures across the browser, editor, client state, IndexedDB, API requests, Fastify handlers, and filesystem operations.
          - paragraph [ref=f4e828]:
            - text: Keep Sentry-disabled behavior unchanged. Apply the credential-containment rules in
            - code [ref=f4e829]: docs/reference/product-guardrails.md
            - text: without censoring Azurite product data.
          - heading "Quality And Scope" [level=2] [ref=f4e830]
          - paragraph [ref=f4e831]: High standards are welcome. Use them to complete the current user story with the architecture and verification it needs.
          - paragraph [ref=f4e832]: If implementation reveals required work that belongs to the same user story, include it in the slice. If work belongs in a separate slice, explain the stable value boundary that makes the split healthy.
          - heading "Implementation Loop" [level=2] [ref=f4e833]
          - paragraph [ref=f4e834]: "Use this loop for meaningful product work:"
          - list [ref=f4e835]:
            - listitem [ref=f4e837]:
              - generic [ref=f4e838]: "1."
              - paragraph [ref=f4e842]: Choose a coherent user story, product capability, refactor, foundation, or quality improvement.
            - listitem [ref=f4e844]:
              - generic [ref=f4e845]: "2."
              - paragraph [ref=f4e849]: Research only the domain needed for that delivery unit, deeply enough to preserve fidelity.
            - listitem [ref=f4e851]:
              - generic [ref=f4e852]: "3."
              - paragraph [ref=f4e856]: Record important sources, constraints, and decisions.
            - listitem [ref=f4e858]:
              - generic [ref=f4e859]: "4."
              - paragraph [ref=f4e863]: Link the shared product guardrails and define only slice-specific regression risks.
            - listitem [ref=f4e865]:
              - generic [ref=f4e866]: "5."
              - paragraph [ref=f4e870]: Implement the slice across every layer required to complete it honestly.
            - listitem [ref=f4e872]:
              - generic [ref=f4e873]: "6."
              - paragraph [ref=f4e877]: Verify both the new behavior and the preserved guardrail behavior with tests, manual checks, or a local demo.
            - listitem [ref=f4e879]:
              - generic [ref=f4e880]: "7."
              - paragraph [ref=f4e884]: Summarize what changed, what was preserved, and identify the next valuable delivery unit.
          - paragraph [ref=f4e885]