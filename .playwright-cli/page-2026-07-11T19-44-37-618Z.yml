          - heading "Working Agreement" [level=1] [ref=f4e470]
          - heading "High-Fidelity Product Slices" [level=2] [ref=f4e471]
          - paragraph [ref=f4e472]: Azurite should be built in coherent, high-quality product and engineering slices. A slice is a delivery unit that lets the user do something new, do an existing thing meaningfully better, or removes a meaningful blocker, risk, or architectural limitation. \nQA-SOURCE-RECOVERY-2026-07-11 A good slice can be reviewed and verified, but its boundary is defined by the user story, engineering outcome, or product capability it completes. Reviewability shapes execution; it does not shrink the slice below the natural workflow boundary.
          - paragraph [ref=f4e473]: When a feature touches behavior inspired by Obsidian, Notion, markdown tools, LSPs, PWAs, or security-sensitive local hosting, fidelity matters. Research should be deep enough for the selected slice to be excellent, not merely plausible.
          - paragraph [ref=f4e474]
          - heading "Research Scope" [level=2] [ref=f4e475]
          - paragraph [ref=f4e476]: Research should be scoped, not rushed.
          - list [ref=f4e477]:
            - listitem [ref=f4e479]:
              - paragraph [ref=f4e487]: Do not time-box research in a way that risks shallow or inaccurate behavior.
            - listitem [ref=f4e489]:
              - paragraph [ref=f4e497]: Do not expand one feature into a broad research phase for the entire product.
            - listitem [ref=f4e499]:
              - paragraph [ref=f4e507]: Research the selected delivery unit deeply enough to make a strong implementation decision.
            - listitem [ref=f4e509]:
              - paragraph [ref=f4e517]: "Convert research into one or more concrete outputs: code, tests, a short decision note, a source entry, or a clearly documented follow-up."
            - listitem [ref=f4e519]:
              - paragraph [ref=f4e527]:
                - text: Track reusable sources in
                - code [ref=f4e528]: docs/research-sources.md
                - text: ", while still looking for additional current sources when research matters."
          - heading "Slice Selection" [level=2] [ref=f4e529]
          - paragraph [ref=f4e530]: Prefer slices that produce visible, testable, or enabling product progress.
          - paragraph [ref=f4e531]: A slice should complete at least one real user story or product capability. Some slices are user-facing features; others are refactors, foundations, tooling, or quality improvements that unlock user-facing work or remove current product pain.
          - paragraph [ref=f4e532]: "A slice should span every product layer required to complete the user story honestly: frontend UI, client state, URL state, browser storage, IndexedDB, backend routes, shared contracts, filesystem behavior, databases, tests, documentation, tooling, and development workflow. If a layer participates in the current workflow or is predictably required by the capability being established, include it in the candidate scope first. Exclude it only when the exclusion forms a stable, useful delivery boundary and does not create immediate follow-up work for the same user story."
          - paragraph [ref=f4e533]: Do not split a slice just because part of it can be implemented separately. Split only when each side is a stable, useful delivery unit.
          - paragraph [ref=f4e534]: A slice is too small when it proves an implementation detail but leaves the user story unfinished, knowingly preserves a broken workflow, or creates immediate follow-up work that is already required for the behavior to be usable.
          - heading "Scope Re-selection During Review" [level=2] [ref=f4e535]
          - paragraph [ref=f4e536]: "Adversarial review, QA, and implementation evidence validate the selected slice boundary; they do not automatically enlarge it. Classify each newly discovered requirement before incorporating it:"
          - list [ref=f4e537]:
            - listitem [ref=f4e539]:
              - generic [ref=f4e540]: "1."
              - paragraph [ref=f4e544]: Include work that is required to complete the current user story honestly.
            - listitem [ref=f4e546]:
              - generic [ref=f4e547]: "2."
              - paragraph [ref=f4e551]: Create or reorder a separate slice when the finding establishes an independently useful product capability, engineering foundation, refactor, or quality outcome.
            - listitem [ref=f4e553]:
              - generic [ref=f4e554]: "3."
              - paragraph [ref=f4e558]: Place a contract in shared reference documentation only when multiple slices or implemented product behavior will reuse it.
          - paragraph [ref=f4e559]: Re-run slice selection explicitly when a finding adds another end-to-end workflow, participating layer, state owner, storage boundary, architectural foundation, or independently testable outcome. Record why the work is inseparable from the current story or name the stable delivery boundary that lets it become a separate slice.
          - paragraph [ref=f4e560]: Do not annex work merely because review discovered it, because implementation touches nearby files, or because the current slice can technically carry it. If the current slice depends on a newly discovered capability, implement that capability first in a preceding slice or explicitly reframe and rename the combined slice as a reviewed product decision. Add, reorder, or relabel later slices when the delivery sequence changes; existing slice labels are not a reason to hide scope expansion.
          - paragraph [ref=f4e561]: Line count alone never decides whether to split. The deciding question is whether each resulting slice delivers stable value without leaving either user story knowingly incomplete.
          - heading "Product-Architecture Framing" [level=2] [ref=f4e562]
          - paragraph [ref=f4e563]: When a QA finding, user frustration, or implementation issue points to a broader capability, define the slice from the product capability first.
          - paragraph [ref=f4e564]: "A slice proposal should answer, in this order:"
          - list [ref=f4e565]:
            - listitem [ref=f4e567]:
              - generic [ref=f4e568]: "1."
              - paragraph [ref=f4e572]: What product capability or user story does this establish?
            - listitem [ref=f4e574]:
              - generic [ref=f4e575]: "2."
              - paragraph [ref=f4e579]: What product decision does it settle?
            - listitem [ref=f4e581]:
              - generic [ref=f4e582]: "3."
              - paragraph [ref=f4e586]:
                - text: For a cross-cutting foundation, what is the compact
                - code [ref=f4e587]: Future Workflow Boundary
                - text: "?"
            - listitem [ref=f4e589]:
              - generic [ref=f4e590]: "4."
              - paragraph [ref=f4e594]: What dependencies, state boundaries, storage layers, contracts, services, and tests are needed to make the capability dependable?
            - listitem [ref=f4e596]:
              - generic [ref=f4e597]: "5."
              - paragraph [ref=f4e601]: Which slice-specific negative side effects require protection beyond the shared product guardrails?
            - listitem [ref=f4e603]:
              - generic [ref=f4e604]: "6."
              - paragraph [ref=f4e608]: What acceptance criteria prove both the new capability and preserved behavior?
          - paragraph [ref=f4e609]:
            - text: Use this table for a
            - code [ref=f4e610]: Future Workflow Boundary
            - text: ":"
          - generic [ref=f4e621]:
            - button [ref=f4e622] [cursor=pointer]
            - button [ref=f4e627] [cursor=pointer]
