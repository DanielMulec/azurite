          - heading "Status" [level=2] [ref=e488]
          - paragraph [ref=e489]: Implemented on July 8, 2026.
          - paragraph [ref=e490]: This slice adds explicit manual saving for existing markdown notes. It turns the Milkdown and Crepe editor surface from a local draft surface into a safe markdown writer while keeping autosave, merge UI, file creation, rename, delete, backlinks, graph behavior, search, indexing, and file watching out of scope.
          - paragraph [ref=e491]: Implementation added the shared save contract, content hashes, safe core note writes, server save route, web API save client, and editor save state UI for existing markdown notes.
          - paragraph [ref=e492]: "Verification completed:"
          - list [ref=e493]:
