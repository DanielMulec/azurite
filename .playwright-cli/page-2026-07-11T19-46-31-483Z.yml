          - heading "Content Hash Decision" [level=2] [ref=e884]
          - paragraph [ref=e885]: Use a content hash as the concurrency token.
          - paragraph [ref=e886]:
            - text: "The hash answers one question before writing: \"Is the on-disk markdown still the same markdown the editor loaded?\" If another app, git operation, another tab, or manual edit changes the file after Azurite loaded it, the current file hash will not match"
            - code [ref=e887]: expectedContentHash
            - text: ", and Azurite must reject the save instead of overwriting unknown content."
          - paragraph [ref=e888]:
            - text: Prefer a content hash over
            - code [ref=e889]: lastModifiedAt
            - text: for conflict detection because a hash fingerprints the file content itself. Timestamps are useful metadata, but they can vary by filesystem precision, tool behavior, and timing edge cases.
          - paragraph [ref=e890]: Do not send the full original markdown back as the concurrency token. A hash is the compact version stamp for the content the user started editing.
