                - text: ", kept the browser draft intact, and did not overwrite the external file"
            - listitem [ref=e570]:
              - paragraph [ref=e578]: invalid traversal-style save request returned a safe typed error without exposing absolute filesystem paths
            - listitem [ref=e580]:
              - paragraph [ref=e588]: mobile-sized and desktop-sized browser checks showed readable save UI without horizontal overflow or status/button overlap
          - heading "Product Decision" [level=2] [ref=e589]
          - paragraph [ref=e590]: Implement manual save before autosave.
          - paragraph [ref=e591]: Autosave is still a good future Azurite experience, but it should reuse a boringly correct write path instead of defining conflict, retry, and persistence semantics at the same time as the first filesystem write. Slice 5 therefore proves the write API, content-hash conflict protection, atomic replacement, and basic save UI first.
          - heading "Goal" [level=2] [ref=e592]
          - paragraph [ref=e593]: "Given an existing selected markdown note, Azurite can:"
          - list [ref=e594]:
            - listitem [ref=e596]:
              - paragraph [ref=e604]: load the note with a content hash,
            - listitem [ref=e606]:
              - paragraph [ref=e614]: let the user edit in WYSIWYG or markdown source mode,
            - listitem [ref=e616]:
              - paragraph [ref=e624]: show whether the editor has unsaved changes,
            - listitem [ref=e626]:
              - paragraph [ref=e634]: save the current editor markdown through an explicit Save action,
            - listitem [ref=e636]:
              - paragraph [ref=e644]: persist the edited markdown to disk safely,
            - listitem [ref=e646]:
              - paragraph [ref=e654]: reject stale saves when the note changed on disk after it was loaded,
            - listitem [ref=e656]:
              - paragraph [ref=e664]: keep the user's unsaved editor content intact after a conflict or failed save,
            - listitem [ref=e666]:
              - paragraph [ref=e674]: refresh note metadata after a successful save.
          - heading "Non-Goals" [level=2] [ref=e675]
          - list [ref=e676]:
            - listitem [ref=e678]:
              - paragraph [ref=e686]: Do not add autosave.
            - listitem [ref=e688]:
              - paragraph [ref=e696]: Do not add merge UI for conflicts.
            - listitem [ref=e698]:
              - paragraph [ref=e706]: Do not add file creation, rename, move, delete, duplicate, or restore.
            - listitem [ref=e708]:
              - paragraph [ref=e716]: Do not add backups UI.
            - listitem [ref=e718]:
              - paragraph [ref=e726]: Do not add file watching.
            - listitem [ref=e728]:
              - paragraph [ref=e736]: Do not add backlinks, graph behavior, tags, search, or indexing.
            - listitem [ref=e738]:
              - paragraph [ref=e746]: Do not save into SQLite or any derived index.
            - listitem [ref=e748]:
              - paragraph [ref=e756]: Do not test first-run writes against Daniel's real knowledgebase.
          - heading "Terms" [level=2] [ref=e757]
          - list [ref=e758]:
