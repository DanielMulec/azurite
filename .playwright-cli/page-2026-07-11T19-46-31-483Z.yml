                - code [ref=e515]: "@azurite/web"
                - text: test and typecheck after the CRLF dirty-state fix
            - listitem [ref=e517]:
              - paragraph [ref=e525]:
                - text: browser QA against
                - code [ref=e526]: /tmp/azurite-slice5-qa.yJ038O
                - text: ", not Daniel's real knowledgebase"
            - listitem [ref=e528]:
              - paragraph [ref=e536]: source-mode save persisted to disk and preserved CRLF-dominant line endings
            - listitem [ref=e538]:
              - paragraph [ref=e546]: browser refresh reloaded the saved content and updated note metadata
            - listitem [ref=e548]:
              - paragraph [ref=e556]: WYSIWYG editing saved Crepe's current markdown to disk
            - listitem [ref=e558]:
