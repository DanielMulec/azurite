          - heading "Follow-Up Slices" [level=2] [ref=e1787]
          - paragraph [ref=e1788]:
            - text: Slice 6 should add the client persistence and navigation foundation described in
            - code [ref=e1789]: docs/slices/archive/slice-6-client-persistence-and-navigation-foundation.md
            - text: .
          - paragraph [ref=e1790]: Phone QA after Slice 5 showed Android Chrome and Edge can reload Azurite when Daniel switches apps, which loses the selected note and unsaved draft because both currently live only in React memory. The fix should establish URL-owned selected-note navigation, durable browser draft persistence, live client state, and recovered conflict behavior while still saving through the Slice 5 content-hash conflict guard.
          - paragraph [ref=e1791]: Slice 7 should add the end-to-end Sentry observability foundation for the current browser, API, and filesystem-backed note workflow. Create-new-note behavior moves later in the roadmap so Azurite can first debug real editor, persistence, and mobile/Tailscale failures from a complete investigation surface.
          - paragraph [ref=e1792]: Slice 8 should add new markdown note creation.
          - paragraph [ref=e1793]: It should decide the first creation location, filename validation, duplicate filename handling, title behavior, optional folder creation, list refresh, URL update, draft initialization, and auto-selection after creation.
          - paragraph [ref=e1794]: Slice 9 should add recoverable delete or move-to-trash behavior.
          - paragraph [ref=e1795]: It should decide whether deletion moves notes to a local trash area, the user's system trash, or a workspace-local recovery folder. It should not introduce permanent one-click deletion as the first delete experience.
          - paragraph [ref=e1796]: Autosave should be a later separately numbered slice after manual save, creation, and recoverable delete are stable.
          - paragraph [ref=e1797]: It should decide debounce timing, queued saves, retry behavior, mobile sleep and reconnect behavior, stale-save UX while typing, whether a manual Save Now escape hatch remains visible, and how conflicts move from detection into review or merge.